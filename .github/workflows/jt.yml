# .github/workflows/update-m3u.yml

name: Auto Update M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: pip install requests

      - name: Generate Full Playlist + Add Star Sports
        env:
          API_URL: ${{ secrets.API_URL }}
          STAR_JSON_URL: ${{ secrets.STAR_JSON_URL }}
        run: |
          python <<EOF
          import os, requests

          api_url = os.environ["API_URL"]
          star_url = os.environ["STAR_JSON_URL"]

          # Fetch main all-channels API
          main_data = requests.get(api_url, timeout=60).json()

          # Fetch hidden Star Sports JSON
          star_data = requests.get(star_url, timeout=60).json()

          lines = ['#EXTM3U']
          used = set()

          def add_channel(ch, force_group=None):
              name = ch.get("channel_name") or ch.get("name") or "Unknown"
              logo = ch.get("channel_logo") or ch.get("logo") or ""
              gid = ch.get("channel_id") or ch.get("id") or ""
              group = (
                  force_group
                  or ch.get("channel_genre")
                  or ch.get("category")
                  or "Live TV"
              )
              stream = ch.get("channel_url") or ch.get("url") or ""
              kid = ch.get("keyId","")
              key = ch.get("key","")

              if not stream or stream in used:
                  return

              used.add(stream)

              lines.append(
                  f'#EXTINF:-1 tvg-id="{gid}" tvg-logo="{logo}" group-title="{group}",{name}'
              )

              if kid not in ["", "null", None] and key not in ["", "null", None]:
                  lines.append("#KODIPROP:inputstream.adaptive.license_type=clearkey")
                  lines.append(
                      f"#KODIPROP:inputstream.adaptive.license_key={kid}:{key}"
                  )

              lines.append(stream)
              lines.append("")

          # STEP 1: Add ALL channels from API_URL
          for ch in main_data:
              add_channel(ch)

          # STEP 2: Add only Star Sports channels into Sports folder
          for ch in star_data:
              name = (
                  ch.get("channel_name")
                  or ch.get("name")
                  or ""
              ).lower()

              if "star sports" in name:
                  add_channel(ch, force_group="Sports")

          with open("jtv.m3u", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          EOF

      - name: Commit Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jtv.m3u
          git commit -m "Auto update full playlist with Star Sports" || echo "No changes"
          git push
